name: Build firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        sensor: [MIS5001, SC3336]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true       

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/luckfox-sdk
          key: arm-rockchip830-v1

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          rm -rf ~/luckfox-sdk
          mkdir -p ~/luckfox-sdk
          curl -L "https://github.com/SobolevTim/luckfox-frigate-cam/releases/download/v0.0.0-toolchain/arm-rockchip830-toolchain.tar.gz" \
            | tar xz -C ~/luckfox-sdk --strip-components=0

      - name: Verify toolchain layout
        run: |
          test -f "$HOME/luckfox-sdk/tools/linux/toolchain/arm-rockchip830-linux-uclibcgnueabihf/bin/arm-rockchip830-linux-uclibcgnueabihf-gcc"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake make

      - name: Build (${{ matrix.sensor }})
        run: |
          export LUCKFOX_SDK_PATH="$HOME/luckfox-sdk"
          chmod +x build.sh
          ./build.sh --sensor ${{ matrix.sensor }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.sensor }}
          path: install/uclibc/
          retention-days: 30

  # Опционально: создавать Release при push тега v*
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Package
        run: |
          for dir in firmware-*; do
            sensor="${dir#firmware-}"
            tar czf "luckfox-camera-rtsp-${sensor}.tar.gz" -C "$dir" .
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true